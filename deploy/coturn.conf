# Template coturn — copia in /etc/turnserver.conf
# Sostituisci DOMINIO e TURN_SECRET

listening-port=3478
tls-listening-port=5349
fingerprint
lt-cred-mech
use-auth-secret
static-auth-secret=TURN_SECRET
realm=DOMINIO
server-name=DOMINIO
no-multicast-peers
no-cli
no-loopback-peers
no-stun-backward-compatibility

# IP pubblico del droplet (sostituisci)
external-ip=IP_PUBBLICO_DROPLET

# Range porte RTP (apri nel firewall DigitalOcean)
min-port=49152
max-port=65535

log-file=/var/log/turnserver.log
verbose
