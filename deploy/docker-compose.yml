# PostgreSQL per produzione — avvia con: docker compose -f deploy/docker-compose.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: omeita-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: omeita
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: omeita
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omeita"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
